<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="brand">
      <!-- Mascot image lives in static/img/mascot.gif -->
      <img class="mascot" src="{{ url_for('static', filename='img/mascot.gif') }}"
           width="56" height="56" alt="Mascot">
      <span class="site-title">todo&middot;pup</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Active</a>
      <a href="{{ url_for('archive') }}">Archive</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    // Show the "N days" input only when "Custom" is the chosen recurrence.
    // Works for both the add form and the edit form.
    document.querySelectorAll('.recur-select').forEach(function (select) {
      var customInput = select.parentElement.querySelector('.custom-n');
      if (!customInput) return;
      function sync() {
        var isCustom = select.value === 'custom';
        customInput.hidden = !isCustom;
        customInput.disabled = !isCustom;  // don't submit a stray value
      }
      select.addEventListener('change', sync);
      sync();  // set correct state on page load
    });
  </script>
</body>
</html>
