<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="brand">
      <!-- Original CSS/SVG mascot: a cute cream puppy in a brown beret.
           Hand-drawn, not based on any copyrighted character. -->
      <svg class="mascot" viewBox="0 0 80 80" width="56" height="56"
           role="img" aria-label="Puppy mascot in a beret">
        <!-- ears -->
        <ellipse cx="20" cy="50" rx="11" ry="18" fill="#d9b88a"/>
        <ellipse cx="60" cy="50" rx="11" ry="18" fill="#d9b88a"/>
        <!-- face -->
        <circle cx="40" cy="48" r="24" fill="#f3e3c3"/>
        <!-- beret -->
        <ellipse cx="40" cy="26" rx="26" ry="11" fill="#6b4a2b"/>
        <ellipse cx="40" cy="23" rx="20" ry="8" fill="#7d5733"/>
        <circle cx="40" cy="16" r="3" fill="#6b4a2b"/>
        <!-- eyes -->
        <circle cx="31" cy="46" r="3.2" fill="#3a2a18"/>
        <circle cx="49" cy="46" r="3.2" fill="#3a2a18"/>
        <circle cx="32" cy="45" r="1" fill="#fff"/>
        <circle cx="50" cy="45" r="1" fill="#fff"/>
        <!-- snout + nose -->
        <ellipse cx="40" cy="57" rx="9" ry="7" fill="#fbf2dd"/>
        <ellipse cx="40" cy="54" rx="3" ry="2.2" fill="#3a2a18"/>
        <!-- mouth -->
        <path d="M40 56 Q36 61 32 58" fill="none" stroke="#3a2a18"
              stroke-width="1.4" stroke-linecap="round"/>
        <path d="M40 56 Q44 61 48 58" fill="none" stroke="#3a2a18"
              stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="site-title">todo&middot;pup</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Active</a>
      <a href="{{ url_for('archive') }}">Archive</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    // Show the "N days" input only when "Custom" is the chosen recurrence.
    // Works for both the add form and the edit form.
    document.querySelectorAll('.recur-select').forEach(function (select) {
      var customInput = select.parentElement.querySelector('.custom-n');
      if (!customInput) return;
      function sync() {
        var isCustom = select.value === 'custom';
        customInput.hidden = !isCustom;
        customInput.disabled = !isCustom;  // don't submit a stray value
      }
      select.addEventListener('change', sync);
      sync();  // set correct state on page load
    });
  </script>
</body>
</html>
